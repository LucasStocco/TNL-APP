# =========================================================
# Conex„o com MySQL via vari·veis de ambiente (Docker)
# =========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================================================
# SERVIDOR
# =========================================================
server.port=8088
server.address=0.0.0.0

# =========================================================
# \uD83D\uDD25 DEBUG IMPORTANTE (RESOLVE SEU PROBLEMA DO 400)
# =========================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# (opcional, mas ajuda MUITO a enxergar JSON errado)
spring.mvc.log-request-details=true
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.validation=DEBUG